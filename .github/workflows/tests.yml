name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        # Pin all runner images (not *-latest) for reproducible CI; bump deliberately.
        # macos-13 (Intel) is no longer provisioned on GitHub-hosted runners;
        # macos-14/-15 are arm64 only, so Intel macOS CI coverage is dropped.
        os: [macos-15, ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pinned to a commit SHA for supply-chain safety; bump deliberately.
      - uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3

      - name: Run brew test-bot (tap syntax / audit)
        run: brew test-bot --only-tap-syntax

      # Run formula tests one at a time with cleanup in between.
      # All versioned formulas install the same `bin/kakehashi` binary.
      # test-bot's --build-bottle links even keg_only formulas, so
      # sequential tests collide unless prior kegs are removed first.
      - name: Detect testing formulae
        id: formulae
        run: |
          output="$(brew test-bot --only-formulae-detect 2>&1)"
          echo "$output"
          list="$(echo "$output" | grep 'testing_formulae' | sed 's/.*testing_formulae *//')"
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - name: Run brew test-bot (formula tests only)
        run: |
          for formula in ${{ steps.formulae.outputs.list }}; do
            echo "::group::Testing $formula"
            brew list --formula 2>/dev/null | grep kakehashi | while read -r keg; do
              brew uninstall --force --ignore-dependencies "$keg" 2>/dev/null || true
            done
            brew test-bot --only-formulae --testing-formulae="$formula"
            echo "::endgroup::"
          done
