name: brew test-bot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-13, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Homebrew/actions/setup-homebrew@master

      - name: Run brew test-bot (formula tests only)
        run: brew test-bot --only-formulae
